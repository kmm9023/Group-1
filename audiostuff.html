<style>
body {
  font-family: 'Gabriela', serif; /* main font */

  color: #1E343B;
  background-color: #f8f4e8;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1, h2 {
  font-family: 'Gabriela', serif;
  font-weight: 500;
  color: #1E343B;
}

.sound-section {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 25px;
  max-width: 900px;
  margin: 0 auto 50px auto;
}

.sound {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.sound img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  cursor: pointer;
}

.lofi img {
  width: 150px;  /* ~2.5x normal */
  height: 150px;
}

.sound-title {
  font-size: 16pt;
  margin-bottom: 5px;
}


input[type="range"] {
  width: 60px;
  height: 10px;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  border-radius: 5px;
  background: linear-gradient(to right, #555 50%, #ccc 50%);
  cursor: pointer;
  outline: none;
  display: none; 
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #222;
  cursor: pointer;
}
input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #222;
  cursor: pointer;
}
</style>
</head>
<body>

  </div>

<script>
const sounds = {};
const sliderValues = {}; 

function toggleSound(img, soundName) {
  const slider = img.nextElementSibling;

  if (sounds[soundName]) {
    sounds[soundName].pause();
    delete sounds[soundName];
    img.src = img.getAttribute('data-active').replace('on', 'off');
    slider.style.display = 'none';
  } else {
    const volume = sliderValues[soundName] !== undefined ? sliderValues[soundName] : slider.value;
    slider.value = volume;

    const audio = new Audio('audio/' + soundName); 
    audio.loop = true;
    audio.volume = volume / 100;
    audio.play();
    sounds[soundName] = audio;

    img.src = img.getAttribute('data-active');
    slider.style.display = 'block';
  }
}

function updateSlider(slider) {
  const value = slider.value;
  slider.style.background = `linear-gradient(to right, #555 ${value}%, #ccc ${value}%)`;

  const img = slider.previousElementSibling;
  const soundName = img.getAttribute('onclick').match(/'([^']+)'/)[1]; 

  sliderValues[soundName] = value; 

  if (sounds[soundName]) {
    sounds[soundName].volume = value / 100;
  }
}

window.onload = () => {
  document.querySelectorAll('input[type="range"]').forEach(updateSlider);
};
</script>
